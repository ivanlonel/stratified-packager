default_install_hook_types:
  - pre-commit
  - post-checkout
  - post-merge
  - post-rewrite

default_language_version:
  python: python3.12

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.28
    hooks:
      - id: uv-lock
        name: uv-lock (frozen)
      - id: uv-sync
        always_run: true
        args:
          - --locked

  - repo: https://github.com/tsvikas/sync-with-uv
    rev: v0.5.0
    hooks:
      - id: sync-with-uv

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=500
      - id: check-ast
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-merge-conflict
        args:
          - --assume-in-merge
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md
      - id: name-tests-test
        args:
          - --pytest-test-first
        exclude: (^|/)_[^/]*\.py$ # files starting with an underscore are not test modules

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: python-check-mock-methods
      - id: python-use-type-annotations
      - id: text-unicode-replacement-char

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.259.2
    hooks:
      - id: renovate-config-validator
        args:
          - --strict

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        language: golang
        additional_dependencies:
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        language: python
        additional_dependencies:
          - mdformat-footnote~=0.1.3
          - mdformat-frontmatter~=2.1.2
          - mdformat-gfm~=1.0.0
          - mdformat-ruff~=0.1.3
          - mdformat-toc~=0.5.0

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.25.2
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args:
          - --fix
          # - --unsafe-fixes
      - id: ruff-format

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args:
          - --config=.flake8
        language: python
        additional_dependencies:
          - flake8-cognitive-complexity~=0.1.0
          - flake8-qgis~=2.1.0
          - flake8-rst-docstrings~=0.4.0
          - pydoclint[flake8]~=0.9.1

  - repo: https://github.com/PyCQA/pylint
    rev: v4.0.6
    hooks:
      - id: pylint

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uv run --exact ty
        args:
          - check
          - --fix
        language: system
        pass_filenames: false
        require_serial: true
        types_or:
          - python
          - pyi
        groups:
          - qgis-venv

      - id: mypy
        name: mypy
        entry: uv run --exact mypy
        args:
          - .
          - --show-traceback
        language: system
        pass_filenames: false
        require_serial: true
        types_or:
          - python
          - pyi
        groups:
          - qgis-venv

      - id: update-metadata
        name: Sync metadata.txt version with the latest CHANGELOG.md entry
        entry: uv run --group pack scripts/update_metadata.py
        language: system
        pass_filenames: false
        files: CHANGELOG.md

      - id: pylupdate
        name: Update translation files
        # --isolated: the pack group's pip pyqt6 must never sync into the project venv,
        # where it shadows QGIS's Qt DLLs (qgis.core stops importing until repaired).
        entry: uv run --isolated --group pack scripts/pylupdate.py
        args:
          - --no-obsolete
          - stratified_packager
          - --ts
          - stratified_packager/resources/i18n/stratified_packager_*.ts
        language: system
        pass_filenames: false
        files: (\.py|\.ui)$

      - id: deptry
        name: deptry
        entry: uv run --exact deptry
        args:
          - .
        language: system
        pass_filenames: false
        require_serial: true
        always_run: true
        groups:
          - qgis-venv

ci:
  autoupdate_schedule: quarterly
  # Hooks that need uv-managed envs or the QGIS runtime, unavailable on pre-commit.ci runners.
  skip:
    - uv-lock
    - uv-sync
    - sync-with-uv
    - ty-check
    - mypy
    - pylupdate
    - update-metadata
    - deptry
  submodules: false
